name: Android APK Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-release:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Dart code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Vanta audio engine Android unit tests
        working-directory: packages/vanta_audio_engine/android
        run: gradle testDebugUnitTest

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check for focused Flutter tests
        run: dart run tool/check_focused_tests.dart

      - name: Run Flutter tests when present
        shell: bash
        run: |
          shopt -s globstar nullglob
          tests=(test/**/*_test.dart)

          if (( ${#tests[@]} == 0 )); then
            echo "No Flutter tests found. Skipping flutter test."
            exit 0
          fi

          flutter test

      - name: Run Vanta audio engine package tests when present
        shell: bash
        run: |
          shopt -s globstar nullglob
          package_dir="packages/vanta_audio_engine"
          tests=("${package_dir}"/test/**/*_test.dart)

          if (( ${#tests[@]} == 0 )); then
            echo "No vanta_audio_engine package tests found. Skipping package flutter test."
            exit 0
          fi

          pushd "${package_dir}"
          flutter pub get
          flutter test
          popd

      - name: Clean package generated artifacts
        if: always()
        shell: bash
        run: |
          rm -rf \
            packages/vanta_audio_engine/.dart_tool \
            packages/vanta_audio_engine/build \
            packages/vanta_audio_engine/android/.gradle \
            packages/vanta_audio_engine/android/.kotlin \
            packages/vanta_audio_engine/android/build \
            packages/vanta_audio_engine/android/.cxx

      - name: Prepare Android signing when secrets are available
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "signed=false" >> "${GITHUB_OUTPUT}"
            echo "Android signing secrets are incomplete or missing. Building with the project's fallback signing config."
            exit 0
          fi

          keystore_path="android/app/upload-keystore.jks"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"

          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

          echo "signed=true" >> "${GITHUB_OUTPUT}"
          echo "Android release signing is configured for this run."

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/VantaMusic-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VantaMusic-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/VantaMusic-${{ github.ref_name }}.apk
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: android-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: VantaMusic-${{ github.ref_name }}
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vanta Music ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
          body: |
            Android beta build for Vanta Music.

            Download the APK attached to this prerelease and install it on an Android device for internal testing.

            This build is intended for beta validation, not public store distribution.
          files: release-artifacts/VantaMusic-${{ github.ref_name }}.apk
          
